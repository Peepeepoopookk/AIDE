name: AIDE signal scoring pipeline

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes, 24/7, laptop off
  workflow_dispatch:           # manual trigger from GitHub UI for testing

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 8         # kill if it hangs (cron fires every 10 min)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run scoring pipeline
        env:
          POCKETBASE_URL:      ${{ secrets.POCKETBASE_URL }}
          PB_ADMIN_EMAIL:      ${{ secrets.PB_ADMIN_EMAIL }}
          PB_ADMIN_PASSWORD:   ${{ secrets.PB_ADMIN_PASSWORD }}
          CEREBRAS_API_KEY:    ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m aide_router.pipeline 50

      - name: Upload budget state (optional artifact for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-state-${{ github.run_number }}
          path: llm_budget_state.json
          retention-days: 3
