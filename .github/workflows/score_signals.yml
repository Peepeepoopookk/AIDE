name: AIDE signal scoring pipeline

on:
#   schedule:
#     - cron: "30 */4 * * *"
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r aide_router/requirements.txt

      - name: Run scoring pipeline
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          CEREBRAS_API_KEY:    ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m aide_router.pipeline 200

      - name: Upload budget state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-state-${{ github.run_number }}
          path: llm_budget_state.json
          retention-days: 3
